[project]
name = "OWASP ASVS (throughline source)"
format_version = 2

# A throughline *source*: a standalone graph a consuming project composes via
# throughline-compose, importing it under a namespace (e.g. `asvs`) and referencing
# clauses as `asvs:SR-0001`. The UIDs here are this source's own and immutable; the
# published ASVS number (e.g. `V2.1.1`) lives in `attrs.source_ref`, never in the UID.
#
# Edition handling: ASVS v4 -> v5 is a full renumber/restructure, not an increment, so
# each edition is its own release branch of this one repo, tagged for point releases:
#   * this branch (main) is the newest edition, v5.0.0  (17 chapters, 345 requirements)
#   * `release/v4` is the v4.0.3 maintenance line (14 chapters, 278 requirements)
# A consumer composes the edition it wants by pinning that ref, e.g.
#   url = "https://github.com/timebacksolutions/throughline-asvs", ref = "v5.0.0"  (or "v4.0.3").
# Each edition has its own UID space starting at UR-0001/SR-0001; because a consumer
# only ever resolves one ref, the two editions never collide.

[grounding]
root_types = ["intent"]
delivery_roots = ["intent"]
ground_link_types = ["derives_from", "implements"]
ai_origins = ["ai", "hybrid"]

# Chapters (ASVS V1..V17) are user_requirements grouping the standard; each
# verification requirement is a system_requirement implementing its chapter.
[types.user_requirement]
attrs.source_ref = { required = true }

[types.system_requirement]
attrs.source_ref = { required = true }
attrs.level = { required = true }

[links]
types = ["derives_from", "implements", "relates"]

[link_rules]
derives_from = { from = ["user_requirement"], to = ["intent"] }
implements   = { from = ["system_requirement"], to = ["user_requirement"] }

[status]
values = ["proposed", "draft", "deferred", "approved", "ratified", "implemented",
          "verified", "suspect", "rejected", "deleted"]

[transitions]
proposed    = ["draft", "approved", "ratified", "deferred", "rejected", "deleted"]
draft       = ["approved", "deferred", "rejected", "deleted"]
deferred    = ["draft", "approved", "rejected", "deleted"]
approved    = ["ratified", "implemented", "deferred", "suspect", "rejected", "deleted"]
ratified    = ["implemented", "suspect", "rejected", "deleted"]
implemented = ["verified", "suspect", "rejected", "deleted"]
verified    = ["implemented", "suspect", "deleted"]
suspect     = ["approved", "ratified", "implemented", "verified", "rejected", "deleted"]
rejected    = ["draft", "deleted"]

# `tl docs` regenerates docs/spec.md from the graph; `tl docs --check` gates it.
# This activates the `unpublished` rule: every live normative item must be
# referenced by a published document or `tl check --strict` fails.
[docs]
paths = ["docs/*.md", "README.md"]
